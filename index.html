<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description"
    content="AI Product Builder OS — Complete system to build, launch, and monetize digital products with AI. Idea → Build → Launch → Revenue.">
  <title>AI Product Builder OS — Build. Ship. Monetize.</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="app-polish.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="main-content"></main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { animate, stagger, spring } from "https://esm.sh/framer-motion@11/dom";
    window.animate = animate;
    window.stagger = stagger;
    window.spring = spring;
  </script>
  <script src="data.js" defer></script>
  <script src="app-part1.js" defer></script>
  <script src="app-part2.js" defer></script>
  <script src="app-part3.js" defer></script>
  <script src="app-kanban.js" defer></script>
  <script src="app-polish.js" defer></script>
  <script src="app-starthere.js" defer></script>
</body>

</html>
